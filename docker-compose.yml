version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# chandra-ocr-service  ·  docker-compose.yml  v4
#
# Volúmenes importantes:
#   /input   → Carpeta con los PDFs del Digesto (montada desde tu PC o Drive)
#   /output  → Resultados .md (sincronizados a Drive por watch_and_sync.py)
#   /cache   → Caché de páginas OCR ya procesadas (persiste entre sesiones)
# ──────────────────────────────────────────────────────────────────────────────

services:
  chandra-ocr:
    build: .
    container_name: chandra-ocr-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./input:/input      # ← PDFs del Digesto (montá tu carpeta aquí)
      - ./output:/output    # ← .md procesados    (sincronizar a Drive)
      - ./cache:/cache      # ← Caché persistente (no borrar entre sesiones)
      - ~/.cache/huggingface:/root/.cache/huggingface   # pesos del modelo
    environment:
      - CHANDRA_MODEL=datalab-to/chandra-ocr-2
      - USE_4BIT=1
      - OCR_DPI=96
      - MAX_IMG_SIDE=1600
      - BATCH_SIZE=2        # subir a 4 en A100/A10G
      - MIN_CHARS=50
      - INPUT_DIR=/input
      - OUTPUT_DIR=/output
      - CACHE_DIR=/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s    # tiempo para cargar el modelo

  # ── Ngrok tunnel (opcional) ────────────────────────────────────────────────
  # Activa con: NGROK_AUTHTOKEN=tu_token docker compose --profile tunnel up -d
  # La URL pública aparece en http://localhost:4040
  # El cliente de Colab la detecta automáticamente si dejás OCR_SERVICE_URL vacío.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: chandra-ngrok
    profiles: ["tunnel"]
    depends_on:
      - chandra-ocr
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http chandra-ocr:8000
    ports:
      - "4040:4040"         # ngrok dashboard local
    restart: unless-stopped
