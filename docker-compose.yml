# version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# chandra-ocr-service  ·  docker-compose.yml  v4
#
# Volúmenes importantes:
#   /input   → Carpeta con los PDFs del Digesto (montada desde tu PC o Drive)
#   /output  → Resultados .md (sincronizados a Drive por watch_and_sync.py)
#   /cache   → Caché de páginas OCR ya procesadas (persiste entre sesiones)
# ──────────────────────────────────────────────────────────────────────────────

services:
  chandra-ocr:
    build: .
    container_name: chandra-ocr-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./input:/data/input      
      - ./output:/data/output    
      - ./cache:/data/cache      
      # CAMBIO 1: Mapeamos tu carpeta de Windows a una ruta local común en el contenedor
      - E:/Varios/Rodrigo/LSI/Tesis de Grado/cache-huggingface:/app/modelo_local
    environment:
      # CAMBIO 2: Le decimos al script que lea el modelo desde la carpeta local armada arriba
      - CHANDRA_MODEL=/app/modelo_local
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - USE_4BIT=0
      - OCR_DPI=96
      - MAX_IMG_SIDE=1600
      - BATCH_SIZE=2        
      - MIN_CHARS=50
      - INPUT_DIR=/input
      - OUTPUT_DIR=/output
      - CACHE_DIR=/cache

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s